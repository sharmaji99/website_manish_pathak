<!DOCTYPE html>
<html lang="hi">

    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Noto Serif Devanagari", "serif"],
            },
            colors: {
              ivory: "#f8f4ee",
              charcoal: "#202020",
              sacred: "#7f1d1d",
              sacredSoft: "#a4422f",
            },
            boxShadow: {
              glow: "0 22px 50px -20px rgba(127, 29, 29, 0.35)",
              soft: "0 10px 30px rgba(32,32,32,0.08)",
            },
          },
        },
      };

    <link rel="stylesheet" href="css/theme.css" />
  </head>
  <body class="bg-ivory text-charcoal antialiased">
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-ivory/85 backdrop-blur-md">
      <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
        <a href="#home" class="group flex items-center gap-3" aria-label="Pandit Manish Pathak">

            alt="Pandit Manish Pathak Logo"
            class="h-11 w-11 rounded-full border border-slate-300/70 object-cover"
          />
          <div>

            <p class="text-xs text-slate-600 sm:text-sm" data-i18n="brandRegion"></p>
          </div>
        </a>

        <button
          id="menuBtn"
          class="inline-flex rounded-full border border-slate-300 bg-white/80 p-2 text-slate-700 transition hover:border-sacred hover:text-sacred focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sacred/40 lg:hidden"
          aria-label="Open menu"
          aria-controls="mainNav"
          aria-expanded="false"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <nav
          id="mainNav"
          class="absolute left-4 right-4 top-full hidden rounded-2xl border border-slate-200 bg-white/95 p-4 shadow-soft lg:static lg:flex lg:items-center lg:gap-6 lg:border-0 lg:bg-transparent lg:p-0 lg:shadow-none"
        >
          <a href="#home" class="nav-link" data-i18n="navHome"></a>
          <a href="#about" class="nav-link" data-i18n="navAbout"></a>
          <a href="#services" class="nav-link" data-i18n="navServices"></a>
          <a href="#events" class="nav-link" data-i18n="navEvents"></a>
          <a href="#contact" class="nav-link" data-i18n="navContact"></a>

          <div class="mt-4 flex items-center gap-2 lg:mt-0 lg:ml-2">
            <button id="langToggle" class="premium-btn-outline px-4 py-2 text-sm" type="button" aria-live="polite"></button>
            <a href="tel:+919926757320" class="premium-btn px-4 py-2 text-sm" data-i18n="callNow"></a>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <section id="home" class="relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-white/50 via-ivory to-ivory"></div>
        <div class="relative mx-auto grid w-full max-w-7xl gap-10 px-4 py-14 sm:px-6 lg:grid-cols-2 lg:gap-14 lg:px-8 lg:py-20">
          <div class="reveal space-y-6">
            <p class="inline-flex rounded-full border border-sacred/20 bg-sacred/5 px-4 py-1.5 text-xs font-semibold tracking-wide text-sacred sm:text-sm" data-i18n="heroTag"></p>
            <h1 class="font-serif text-3xl font-semibold leading-tight sm:text-4xl lg:text-5xl" data-i18n="heroTitle"></h1>
            <p class="max-w-xl text-sm leading-relaxed text-slate-700 sm:text-base" data-i18n="heroSubtitle"></p>

            <div class="flex flex-wrap items-center gap-3">
              <a href="https://wa.me/919926757320" class="premium-btn px-6 py-3" data-i18n="whatsappCta"></a>
              <a href="#contact" class="premium-btn-outline px-6 py-3" data-i18n="consultationCta"></a>
            </div>

            <ul class="grid grid-cols-1 gap-3 text-sm sm:grid-cols-3">
              <li class="rounded-xl border border-slate-200 bg-white/75 px-4 py-3 shadow-soft">
                <p class="font-semibold text-sacred">15+</p>
                <p data-i18n="heroMetricOne"></p>
              </li>
              <li class="rounded-xl border border-slate-200 bg-white/75 px-4 py-3 shadow-soft">
                <p class="font-semibold text-sacred">1000+</p>
                <p data-i18n="heroMetricTwo"></p>
              </li>
              <li class="rounded-xl border border-slate-200 bg-white/75 px-4 py-3 shadow-soft">
                <p class="font-semibold text-sacred">24x7</p>
                <p data-i18n="heroMetricThree"></p>
              </li>
            </ul>
          </div>

          <div class="reveal reveal-delay relative">
            <div class="glass-card p-6 sm:p-8">
              <div class="space-y-4 rounded-2xl border border-white/40 bg-white/50 p-5 shadow-glow sm:p-6">
                <p class="font-serif text-2xl font-semibold text-sacred" data-i18n="heroCardTitle"></p>
                <p class="text-sm leading-relaxed text-slate-700" data-i18n="heroCardBody"></p>

      <section id="about" class="mx-auto w-full max-w-7xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
        <div class="reveal mx-auto max-w-3xl text-center">
          <p class="section-kicker" data-i18n="aboutKicker"></p>
          <h2 class="section-title" data-i18n="aboutTitle"></h2>
          <p class="section-copy" data-i18n="aboutText"></p>
        </div>
      </section>

      <section id="services" class="bg-white/60 py-14 lg:py-20">
        <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
          <div class="reveal mb-8 text-center">
            <p class="section-kicker" data-i18n="serviceKicker"></p>
            <h2 class="section-title" data-i18n="serviceTitle"></h2>
          </div>

          <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <article class="service-card reveal" data-service="1"><h3 data-i18n="service1"></h3></article>
            <article class="service-card reveal" data-service="2"><h3 data-i18n="service2"></h3></article>
            <article class="service-card reveal" data-service="3"><h3 data-i18n="service3"></h3></article>
            <article class="service-card reveal" data-service="4"><h3 data-i18n="service4"></h3></article>
            <article class="service-card reveal hidden-service" data-service="5"><h3 data-i18n="service5"></h3></article>
            <article class="service-card reveal hidden-service" data-service="6"><h3 data-i18n="service6"></h3></article>
            <article class="service-card reveal hidden-service" data-service="7"><h3 data-i18n="service7"></h3></article>
            <article class="service-card reveal hidden-service" data-service="8"><h3 data-i18n="service8"></h3></article>
          </div>

          <div class="mt-8 flex justify-center">
            <button id="toggleServices" class="premium-btn-outline px-6 py-3" type="button"></button>
          </div>
        </div>
      </section>

      <section class="mx-auto w-full max-w-5xl px-4 py-14 text-center sm:px-6 lg:py-20">
        <blockquote class="reveal rounded-3xl border border-sacred/20 bg-white/70 px-6 py-10 shadow-soft sm:px-10">
          <p class="font-serif text-2xl leading-relaxed text-sacred sm:text-3xl" data-i18n="mantra"></p>
          <footer class="mt-4 text-sm text-slate-600" data-i18n="mantraSource"></footer>

      <section id="events" class="bg-white/60 py-14 lg:py-20">
        <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
          <div class="reveal mb-8 text-center">
            <p class="section-kicker" data-i18n="eventsKicker"></p>
            <h2 class="section-title" data-i18n="eventsTitle"></h2>
          </div>
          <div class="grid gap-5 md:grid-cols-3">
            <article class="media-card reveal">
              <h3 data-i18n="event1Title"></h3>
              <p data-i18n="event1Desc"></p>
            </article>
            <article class="media-card reveal reveal-delay">
              <h3 data-i18n="event2Title"></h3>
              <p data-i18n="event2Desc"></p>
            </article>
            <article class="media-card reveal reveal-delay-2">

        </div>

      <section id="contact" class="mx-auto w-full max-w-7xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
        <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
          <div class="reveal space-y-4">
            <p class="section-kicker" data-i18n="contactKicker"></p>
            <h2 class="section-title text-left" data-i18n="contactTitle"></h2>
            <p class="section-copy text-left" data-i18n="contactCopy"></p>

            <div class="flex flex-wrap gap-3">
              <a href="https://wa.me/919926757320" class="premium-btn px-5 py-2.5" data-i18n="whatsapp"></a>
              <a href="https://instagram.com" target="_blank" rel="noreferrer" class="premium-btn-outline px-5 py-2.5" data-i18n="instagram"></a>
              <a href="https://youtube.com" target="_blank" rel="noreferrer" class="premium-btn-outline px-5 py-2.5" data-i18n="youtube"></a>
            </div>
          </div>

          <form class="reveal reveal-delay rounded-3xl border border-slate-200 bg-white/80 p-5 shadow-soft sm:p-6" novalidate>
            <div class="space-y-4">
              <label class="block text-sm font-medium" for="name" data-i18n="formName"></label>
              <input id="name" type="text" class="form-input" data-i18n-placeholder="formNamePlaceholder" />

              <label class="block text-sm font-medium" for="phone" data-i18n="formPhone"></label>
              <input id="phone" type="tel" class="form-input" data-i18n-placeholder="formPhonePlaceholder" />

              <label class="block text-sm font-medium" for="message" data-i18n="formMessage"></label>
              <textarea id="message" rows="4" class="form-input" data-i18n-placeholder="formMessagePlaceholder"></textarea>

              <button type="button" class="premium-btn w-full justify-center px-6 py-3" data-i18n="formSubmit"></button>
            </div>
          </form>

    <script src="js/main.js"></script>

</html>
